plugins {
	id 'fabric-loom' version '1.11-SNAPSHOT'
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

loom {
	runs {
		client {
			property "devauth.enabled", "true"
			property "devauth.account", "main"
		}
	}
}

repositories {
	maven {
		url = "https://api.modrinth.com/maven"
	}
	maven {
		name = "DevAuth"
		url = "https://pkgs.dev.azure.com/djtheredstoner/DevAuth/_packaging/public/maven/v1"
	}
	maven {
		name = "TerraformersMC"
		url = "https://maven.terraformersmc.com/releases/"
	}
	maven {
		name = "Gegy"
		url = "https://maven.gegy.dev"
	}
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	// SpruceUI for enhanced GUI widgets
	include modImplementation("dev.lambdaurora:spruceui:8.0.4+1.21.8")

	// ModMenu integration
	modCompileOnly "com.terraformersmc:modmenu:14.0.0-beta.1"

	// DevAuth: authenticate with a real Microsoft account in dev environment
	modRuntimeOnly "me.djtheredstoner:DevAuth-fabric:1.2.2"

	// Apache HttpClient for Mojang API skin upload
	implementation "org.apache.httpcomponents:httpclient:4.5.13"
	implementation "org.apache.httpcomponents:httpmime:4.5.13"
	implementation "org.apache.httpcomponents:httpcore:4.4.15"
	include "org.apache.httpcomponents:httpclient:4.5.13"
	include "org.apache.httpcomponents:httpmime:4.5.13"
	include "org.apache.httpcomponents:httpcore:4.4.15"
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

java {
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.base.archivesName.get()}"}
	}
}

// configure the maven publication
publishing {
	publications {
		mavenJava(MavenPublication) {
			from components.java
		}
	}

	repositories {
		// Add repositories to publish to here.
	}
}
